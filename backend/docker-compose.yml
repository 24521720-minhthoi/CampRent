services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: camprent-backend
        container_name: camprent-app
        restart: unless-stopped
        working_dir: /var/www/html
        ports:
            - "8000:80"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: camprent_db
            DB_USERNAME: camprent_user
            DB_PASSWORD: camprent_password
            AI_SERVICE_URL: http://host.docker.internal:8001
            AI_SERVICE_TIMEOUT: 30
        volumes:
            - ./:/var/www/html
            - vendor_data:/var/www/html/vendor
            - storage_data:/var/www/html/storage
            - bootstrap_cache:/var/www/html/bootstrap/cache
        networks:
            - camprent-network

    db:
        container_name: camprent-mysql
        image: mysql:8.0
        ports:
            - 3306:3306
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: camprent_db
            MYSQL_USER: camprent_user
            MYSQL_PASSWORD: camprent_password
        command: --default-authentication-plugin=mysql_native_password
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - camprent-network

networks:
    camprent-network:
        driver: bridge

volumes:
    mysql_data:
    vendor_data:
    storage_data:
    bootstrap_cache:
